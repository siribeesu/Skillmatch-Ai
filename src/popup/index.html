<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SkillMatch AI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="logo">
        <img src="icons/icon48.png" style="width:32px; height:32px; border-radius:6px; object-fit:cover;" />
        <h1>SkillMatch AI</h1>
      </div>
      <button id="closeBtn" class="icon-btn" title="Close Panel">✕</button>
    </header>

    <main class="content">
      <!-- Section 1: Upload Resume -->
      <section id="uploadSection" class="card fade-in">
        <h2>Your Resume</h2>
        <div class="upload-area" id="dropZone">
          <input type="file" id="resumeUpload" accept=".pdf,.docx" hidden />
          <div class="upload-content">
            <span class="upload-icon">📄</span>
            <p>Drag & Drop or <label for="resumeUpload" style="cursor:pointer;" class="highlight">Browse</label></p>
            <p class="subtext">Supports PDF, DOCX</p>
          </div>
        </div>
        <div id="uploadStatus" class="status-msg hidden"></div>
      </section>

      <!-- Section 2: Actions & Processing State -->
      <section id="actionSection" class="hidden fade-in">
        <button id="analyzeBtn" class="primary-btn pulse">
          Analyze Job Match
        </button>
        <button id="reviewSkillsBtn" class="secondary-btn" style="margin-top: 10px;">
          Review My Saved Skills
        </button>
        <div id="loader" class="loader hidden">
          <div class="spinner"></div>
          <p>Extracting insights using NLP...</p>
        </div>
      </section>

      <!-- Section: Display My Skills -->
      <section id="mySkillsSection" class="hidden fade-in card">
        <h3 style="margin-top: 0;">My Extracted Skills</h3>
        <div id="mySkillsList" class="pill-container" style="margin-bottom: 16px;"></div>
        
        <div class="add-skill-box" style="display:flex; gap:8px; margin-bottom:16px;">
          <input type="text" id="newSkillInput" placeholder="Add missing skill..." style="flex:1; padding:8px; border-radius:6px; border:1px solid var(--border-color); font-size:13px;" />
          <button id="addSkillBtn" class="primary-btn" style="width:60px; padding:8px; font-size:12px;">Add</button>
        </div>

        <button id="closeSkillsBtn" class="secondary-btn">Back to Dashboard</button>
      </section>

      <!-- Section 3: Results -->
      <section id="resultsSection" class="hidden fade-in">
        <!-- Experience Alert Placeholder -->
        <div id="discrepancyAlert" class="hidden" style="background:#fee2e2; border:1px solid #fecaca; padding:12px; border-radius:10px; margin-bottom:16px; color:#b91c1c; font-size:12px; line-height:1.4;"></div>

        <!-- ATS Score Card -->
        <div class="card result-card score-card">
          <h4 id="jobTitleDisplay" style="margin: 0 0 10px 0; color: #3b82f6; font-size: 13px;"></h4>
          <div class="score-header">
            <h3>Match Score</h3>
            <span class="badge at-risk" id="scoreBadge">Evaluating</span>
          </div>
          <div class="progress-bar-container">
            <div class="progress-bar" id="scoreBar"></div>
          </div>
          <p class="score-text"><span id="scoreValue">0</span>% Compatible</p>
        </div>
        


        <!-- Matched Skills -->
        <div class="card result-card">
          <h3>✅ Matched Skills</h3>
          <div class="pill-container" id="matchedSkills"></div>
        </div>

        <!-- Missing Skills & Intelligence -->
        <div class="card result-card gap-card">
          <h3>⚠️ Skill Gaps (Critical)</h3>
          <div class="list-container" id="missingSkills"></div>
        </div>


      </section>
    </main>


  </div>
  <script src="popup.js"></script>
</body>
</html>
